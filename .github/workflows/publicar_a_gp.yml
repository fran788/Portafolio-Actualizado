name: VITE MPA Publicar a Github Pages

on:
  push:
    branches:
      - main
permissions:
  contents: read
  pages: write
  id-token: write
env:
  DEPLOY_BASE_URL: ${{ vars.DEPLOY_BASE_URL }}
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    enviroment:
      name: github-pages
      url: ${{ steps.github-pages.output.url }}
    runs-on: ubuntu-latest
    steps:
      - name: Clonar el Repositorio
        uses: actions/checkout@v4
      - name: Instalar Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Instalar Dependencias del Proyecto
        run: npm install
      - name: Compilar el Proyecto en Dist
        run: npm run build
      - name: Configurar GitHub Pages para Publicar
        uses: actions/configure-pages@v5
      - name: Subir los compilados (DIST)
        uses: actions/upload-pages-artifact@v4
        with:
          path: './dist'
      - name: Publicar Artefactos
        uses: actions/deploy-pages@v4